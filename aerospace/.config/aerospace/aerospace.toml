# AeroSpace window manager config

# Start AeroSpace at login
start-at-login = true

# BSP layout with gaps
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

[gaps]
inner.horizontal = 10
inner.vertical = 10
outer.left = 10
outer.bottom = 10
outer.top = 10
outer.right = 10

# Window management keybindings
[mode.main.binding]

# Close window
alt-w = 'close'

# Fullscreen toggle
alt-f = 'fullscreen'

# Toggle float
alt-t = 'layout floating tiling'

# Focus direction
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Move window
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Switch workspace
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
# alt-3 reserved for # on UK/ISO keyboards
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

# Move to workspace
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'

# Next/prev workspace
alt-tab = 'workspace next'
alt-shift-tab = 'workspace prev'

# Resize
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'

# Second monitor workspaces (ctrl-alt)
ctrl-alt-1 = 'workspace 11'
ctrl-alt-2 = 'workspace 12'
ctrl-alt-4 = 'workspace 14'
ctrl-alt-5 = 'workspace 15'
ctrl-alt-6 = 'workspace 16'
ctrl-alt-7 = 'workspace 17'
ctrl-alt-8 = 'workspace 18'
ctrl-alt-9 = 'workspace 19'

# Move to second monitor workspace (ctrl-alt-shift)
ctrl-alt-shift-1 = 'move-node-to-workspace 11'
ctrl-alt-shift-2 = 'move-node-to-workspace 12'
ctrl-alt-shift-4 = 'move-node-to-workspace 14'
ctrl-alt-shift-5 = 'move-node-to-workspace 15'
ctrl-alt-shift-6 = 'move-node-to-workspace 16'
ctrl-alt-shift-7 = 'move-node-to-workspace 17'
ctrl-alt-shift-8 = 'move-node-to-workspace 18'
ctrl-alt-shift-9 = 'move-node-to-workspace 19'

# Pin workspaces to monitors
[workspace-to-monitor-force-assignment]
1 = 'main'
2 = 'main'
4 = 'main'
5 = 'main'
6 = 'main'
7 = 'main'
8 = 'main'
9 = 'main'
11 = 'secondary'
12 = 'secondary'
14 = 'secondary'
15 = 'secondary'
16 = 'secondary'
17 = 'secondary'
18 = 'secondary'
19 = 'secondary'
